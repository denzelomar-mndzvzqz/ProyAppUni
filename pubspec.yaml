name: fcq_app
description: A new Flutter project.

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '^3.2.0'

dependencies:
  flutter:
    sdk: flutter



  cupertino_icons: ^1.0.2
  http: any
  shared_preferences: ^2.2.1
  flutter_widget_from_html: ^0.10.5+3
  intl: ^0.18.1
